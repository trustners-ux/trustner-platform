<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trustner - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #0D1B3E 0%, #1a2a5e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .offline-container {
      background: white;
      border-radius: 12px;
      padding: 40px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    .offline-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      background: #FEF3E2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      color: #0D1B3E;
      font-size: 24px;
      margin-bottom: 12px;
      font-weight: 600;
    }

    p {
      color: #666;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .offline-details {
      background: #f5f5f5;
      border-left: 4px solid #D4A843;
      padding: 16px;
      text-align: left;
      border-radius: 4px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #666;
    }

    .offline-details strong {
      color: #0D1B3E;
      display: block;
      margin-bottom: 8px;
    }

    .offline-details ul {
      margin-left: 16px;
      line-height: 1.8;
    }

    button {
      background: #0D1B3E;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #0a1329;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(13, 27, 62, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .status-badge {
      display: inline-block;
      background: #FEF3E2;
      color: #D4A843;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #D4A843;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 600px) {
      .offline-container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 20px;
      }

      p {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="status-badge">Offline Mode</div>
    <div class="offline-icon">
      📡
    </div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. Trustner Partner OS is trying to reconnect.
    </p>

    <div class="offline-details">
      <strong>What you can do:</strong>
      <ul>
        <li>Check your internet connection</li>
        <li>Try again in a few moments</li>
        <li>Some cached content may be available</li>
      </ul>
    </div>

    <button onclick="location.reload()">
      Try Again
    </button>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => {
      location.reload();
    });

    // Check connection status periodically
    setInterval(() => {
      fetch('/api/health', { method: 'HEAD', no-cors: true })
        .then(() => {
          location.reload();
        })
        .catch(() => {
          // Still offline
        });
    }, 5000);
  </script>
</body>
</html>
