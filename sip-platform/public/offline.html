<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Offline · MeraSIP</title>
<style>
  :root { --navy:#15233B; --gold:#9A7B4F; --mute:#6B7280; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:'Helvetica Neue',Helvetica,Arial,sans-serif; background:#EDEFF2; color:#1F2937;
         min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:#fff; max-width:380px; width:100%; border-radius:14px; padding:32px 26px; text-align:center;
          box-shadow:0 10px 40px rgba(21,35,59,0.12); border-top:3px solid var(--gold); }
  .mark { width:64px; height:64px; border-radius:14px; background:var(--navy); color:#fff; font-family:Georgia,serif;
          font-weight:700; font-size:30px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; }
  h1 { font-family:Georgia,'Times New Roman',serif; color:var(--navy); font-size:20px; margin-bottom:8px; }
  p { color:var(--mute); font-size:13.5px; line-height:1.5; margin-bottom:18px; }
  button { background:var(--navy); color:#fff; border:0; padding:11px 22px; border-radius:8px; font-size:14px;
           font-weight:700; cursor:pointer; }
  .foot { margin-top:18px; font-size:11px; color:#9CA3AF; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">T</div>
    <h1>You&rsquo;re offline</h1>
    <p>MeraSIP needs a connection to load live data. Check your internet and try again — your work is safe.</p>
    <button onclick="location.reload()">Retry</button>
    <div class="foot">MeraSIP by Trustner</div>
  </div>
</body>
</html>
