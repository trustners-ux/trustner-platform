services:
  - type: web
    name: merasip-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: reports
      - key: BREVO_API_KEY
        sync: false
      - key: INTERAKT_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
    healthCheckPath: /health
